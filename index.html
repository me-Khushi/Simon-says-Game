<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Say Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 id="mainheading">Simon Say Game</h1>
    <h2 id="start">Press Any Key to Start the Game</h2>
    <button id="start-btn">Start Game</button>
    <div id="game-board">
        <div class="color-button" id="red"></div>
        <div class="color-button" id="green"></div>
        <div class="color-button" id="blue"></div>
        <div class="color-button" id="yellow"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
